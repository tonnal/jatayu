mandate:
  id: generated
  name: "Sole Compliance Officer \u2013 Singapore Asset Manager (MAS-licensed, AI-distribution)"
  description: 'Singapore-headquartered, MAS-licensed asset manager (~SGD 400-700M
    proprietary AUM plus larger third-party AUM distributed to Accredited Investors
    via open-architecture wrappers). Recently acquired by a global alternatives manager;
    rebuilding institutional infrastructure after a retail/IFA heritage. The hire
    is the SOLE compliance officer: AI client onboarding, MAS regulatory management,
    fund governance, trade/risk oversight, Board reporting. No team beneath them.
    Commercially oriented, growth-mode, front-office partner. Singapore-based, 8-15
    years compliance experience.'
