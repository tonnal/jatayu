scoring:
  model: claude-opus-4-7
  gates:
  - id: G1_location
    description: Currently based in Singapore (not relocation candidate).
    hard: true
  - id: G2_buyside_AM
    description: "\u22653 years in-house compliance at an MAS CMS-licensed asset manager\
      \ (buy-side); banking/brokerage/IFA/Big4-only profiles fail."
    hard: true
  - id: G3_AI_onboarding
    description: "Demonstrable Accredited Investor client onboarding compliance under\
      \ the firm's own license \u2014 not retail/IFA distribution."
    hard: true
  - id: G4_experience_band
    description: "8\u201315 years total compliance experience (allow modest flex to\
      \ 16\u201317 if scope fits)."
    hard: true
  - id: G5_scope_ownership
    description: 'Has held sole or near-sole compliance ownership at a boutique AM,
      OR is a credible #2 at a mid-size AM ready to step up.'
    hard: true
  - id: G6_mas_fluency
    description: Working fluency with MAS CMS framework and AI vs Retail distinction
      (evidenced in role content, not just keyword).
    hard: true
  - id: G7_not_regulator_only
    description: Not a regulator-only career (MAS/SFC) without industry seat.
    hard: true
  sub_scores:
  - id: S1_AI_onboarding_depth
    label: Depth of Accredited Investor onboarding under own MAS license
    weight: 0.22
    guidance: Score high where candidate personally owned AI verification, suitability,
      and CDD under the employer's own CMS license; low if AI exposure is via an IFA/distributor
      relationship.
  - id: S2_sole_officer_scope
    label: Sole / near-sole compliance ownership at independent SG AM
    weight: 0.2
    guidance: "Score high for named Compliance Officer at a 20\u2013150 staff CMS-licensed\
      \ AM with no compliance team beneath; medium for credible #2 ready to step up;\
      \ low for large-team embedded roles."
  - id: S3_alternatives_open_arch
    label: Open-architecture / third-party alternatives distribution exposure
    weight: 0.15
    guidance: Score high for hands-on compliance over feeder/wrapper structures distributing
      third-party PE/PC/HF to AI clients; medium for in-house alternatives only; low
      for long-only equity/FI only.
  - id: S4_mas_regulatory_fluency
    label: MAS CMS regulatory and fund governance fluency
    weight: 0.15
    guidance: Score high for evidenced work on CMS variations, MAS filings (Form 1/22A),
      thematic inspections, Board reporting; medium for general SFA/FAA familiarity.
  - id: S5_commercial_posture
    label: Commercial / front-office partnership orientation
    weight: 0.12
    guidance: Score high where references/role content show product enablement, new-fund
      onboarding, deal review partnership; low for pure monitoring/reporting framing.
  - id: S6_transformation_mindset
    label: Build / transformation track record (post-M&A, license upgrade, scaling)
    weight: 0.1
    guidance: Score high for prior role where candidate rebuilt or scaled compliance
      infrastructure post-acquisition or license change; medium for steady-state ownership.
  - id: S7_vcc_familiarity
    label: VCC structure familiarity
    weight: 0.06
    guidance: Score high for direct VCC / sub-fund governance work; medium for awareness;
      low/zero if no exposure (not disqualifying).
  shortlist_threshold: 35.0
spec:
  must_haves:
  - Singapore-based; right to work locally
  - "8\u201315 years compliance experience with material time inside a MAS CMS-licensed\
    \ asset manager (buy-side), not banking/brokerage/IFA-only"
  - Sole or near-sole compliance ownership (lean compliance function, no large team
    scaffolding) at an independent SG asset manager
  - "Direct hands-on Accredited Investor (AI) client onboarding compliance under the\
    \ firm's own MAS license \u2014 KYC/CDD, AI verification, suitability, MAS Notice\
    \ SFA04-N09/FAA-N06"
  - Working fluency with MAS CMS licensing categories (Fund Management, dealing in
    capital markets products) and the AI vs Retail regulatory distinction
  - 'Fund governance experience: prospectus/PPM review, side-letter review, fund board/Board
    reporting'
  - "Commercial orientation \u2014 demonstrated front-office partnership, not pure\
    \ gatekeeper posture"
  nice_to_haves:
  - "VCC (Variable Capital Company) structure familiarity \u2014 sub-fund governance,\
    \ VCC Act compliance"
  - Open-architecture / third-party fund distribution oversight (feeder structures,
    private credit / PE / hedge fund wrappers from global GPs)
  - Experience supporting a license-category upgrade or post-M&A compliance rebuild
  - Trade surveillance and investment risk oversight exposure for alternatives
  - Prior interface with MAS thematic inspections / s.330 notifications
  - ICA / ACAMS / equivalent certification
criteria_evidence:
- want: Genuine buy-side asset management compliance (not banking/brokerage)
  proxy: Current/recent employer is an MAS CMS-licensed Fund Management Company with
    <300 staff; title sits in Compliance not Legal-Compliance-Ops blend
  signal: high
- want: Sole-officer scope / boutique ownership
  proxy: "Employer headcount 10\u2013150; candidate is the named Compliance Officer\
    \ or Head of Compliance with no direct reports listed; tenure \u22652 yrs"
  signal: high
- want: Accredited Investor onboarding under own license
  proxy: Self-described AI onboarding, AI verification, suitability for AI clients;
    firm distributes to AI not retail; absence of 'IFA' / 'FA license' framing
  signal: high
- want: MAS CMS regulatory fluency
  proxy: Mentions of CMS license, SFA, FAA, MAS Notices (SFA04-N09, SFA04-N12, FMR),
    Form 1/Form 22A filings
  signal: high
- want: Open-architecture / third-party fund distribution
  proxy: Mentions of feeder funds, third-party GP distribution, private credit/PE/HF
    wrappers, sub-distribution agreements
  signal: medium
- want: VCC familiarity
  proxy: Mentions VCC, sub-fund, VCC Act, ACRA VCC filings
  signal: medium
- want: Commercial / front-office partnership
  proxy: Language around 'business enablement', 'product launch', 'new fund onboarding',
    deal review; not purely 'monitoring/reporting'
  signal: medium
- want: Transformational / build mindset
  proxy: Past role at a firm that scaled, was acquired, or had a license upgrade;
    framework / policy build references
  signal: medium
- want: "Wrong pool \u2014 retail/IFA compliance"
  proxy: Employer is an FA-licensed IFA, retail wealth platform, or insurance-linked
    distributor
  signal: negative
- want: "Wrong pool \u2014 bank/brokerage compliance"
  proxy: Tier-1 bank, IB, prime brokerage, or pure securities-dealing CMS only; >2,000
    staff employer
  signal: negative
- want: "Wrong pool \u2014 Big 4 advisory only"
  proxy: Career entirely in Big 4 risk/regulatory advisory with no in-house buy-side
    seat
  signal: negative
- want: "Wrong pool \u2014 regulator-only"
  proxy: MAS / SFC / HKMA career with no industry-side tenure
  signal: negative
