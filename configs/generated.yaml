mandate:
  id: generated
  name: "Sole Compliance Officer / Head of Compliance \u2014 SG MAS CMS-licensed Asset\
    \ Manager (AI segment)"
  description: "Client profile (anonymised): Singapore-headquartered, MAS-licensed\
    \ asset manager. Approximately\nSGD 400-700M proprietary AUM, with materially\
    \ larger third-party AUM distributed to Accredited\nInvestor clients via open-architecture\
    \ wrappers (private credit, private equity, hedge funds from\nglobal GPs). Recently\
    \ acquired by a top-tier global alternatives manager and currently rebuilding\n\
    institutional infrastructure following a transition from retail/IFA-linked heritage.\
    \ Holds a Capital\nMarkets Services license under MAS.\nThe role: Sole compliance\
    \ officer for the entity. Full ownership: AI client onboarding compliance,\nMAS\
    \ regulatory management, fund governance, trade and risk oversight, Board reporting.\
    \ No team\nbeneath the hire. Reports to senior management and Board. Transformational\
    \ seat, not steady-state\nBAU.\nProfile orientation: Singapore-based candidates\
    \ only. 8-15 years compliance experience.\nCommercially oriented; the firm is\
    \ in growth mode and the role requires partnership with the front\noffice.\nWhat\
    \ good likely looks like: Sole or near-sole compliance experience at an independent\
    \ SG asset\nmanager; direct AI onboarding under own license (not retail/IFA only);\
    \ fluency with MAS CMS\nlicensing categories and the AI/Retail distinction; exposure\
    \ to open-architecture / third-party fund\ndistribution; VCC structure familiarity.\n\
    What weak likely looks like: Pure banking or capital markets compliance with no\
    \ AM exposure; Big 4\nadvisory compliance only; MAS regulators with no industry\
    \ side; retail-only IFA compliance with no AI\nonboarding.\nThis guidance is deliberately\
    \ partial. Building the inference logic that maps these textures onto\nobservable\
    \ Coresignal data is the assignment.\nResearch signposts: MAS website on Capital\
    \ Markets Services License categories; the Accredited\nInvestor vs Retail distinction;\
    \ VCC structure; recent MAS enforcement actions on AM licensees. For\nstudying\
    \ the shape of compliance functions at independent SG AMs (study, do not source\
    \ from):\nGordian Capital, Endowus, iFAST's CMS arm, Tikehau Singapore.\nMandate\
    \ note: The universe is narrow but easy to over-include. Title-matching \"Compliance\
    \ +\nSingapore + Asset Management\" returns hundreds of profiles where most are\
    \ wrong fits. Signal lives\nin adjacent attributes \u2014 firm scale, license\
    \ type, compliance team headcount, AM business model \u2014\nnot in the role title."
