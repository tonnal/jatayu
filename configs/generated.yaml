off_limits:
- The acquiring global alternatives parent and its named affiliates (no poaching from
  within new ownership group)
- Current and immediate-past compliance hires at the client entity itself
- Any firm under active commercial/distribution MoU with the client (to be confirmed
  with client before outreach)
