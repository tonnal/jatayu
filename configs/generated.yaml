scoring:
  model: claude-sonnet-4-6
  gates:
  - id: G1_geo
    description: Currently based in Singapore (or has a 5+ year recent track record
      in Singapore with current location Singapore). Remote/overseas-only candidates
      fail.
    hard: true
  - id: G2_buyside_compliance
    description: Has held a compliance role inside an MAS-licensed asset manager,
      EAM, hedge fund, PE firm, or private-bank wealth/investment compliance desk.
      Pure retail-FA, payments, crypto-exchange, or brokerage-only compliance fails.
    hard: true
  - id: G3_experience_band
    description: 8-15 years total compliance experience; not a junior analyst, not
      a 25-year career CCO seeking a team-building remit they won't get here.
    hard: true
  sub_scores:
  - id: S1_mas_buyside_depth
    label: MAS + buy-side compliance depth
    weight: 0.22
    guidance: Years and recency inside MAS-licensed CMS/LFMC/RFMC or private-bank
      wealth compliance. Reward multiple buy-side employers; penalise single-firm-only
      careers.
  - id: S2_ai_onboarding
    label: Accredited Investor onboarding & SFA classification
    weight: 0.18
    guidance: "Direct evidence of running AI/HNW onboarding at scale \u2013 SFA s.4A\
      \ classification, source-of-wealth, ongoing review. Private-bank wealth-compliance\
      \ and EAM backgrounds score highest."
  - id: S3_sole_scope_fit
    label: Sole-officer scope readiness
    weight: 0.15
    guidance: Has personally owned the compliance monitoring programme end-to-end
      at a firm of 20-150 people. Penalise candidates who only managed within a large
      team or have never presented to a Board.
  - id: S4_fund_governance
    label: Fund governance & wrapper familiarity
    weight: 0.12
    guidance: VCC, Cayman/Lux feeders, fund-board reporting, administrator/trustee
      oversight, offering-doc review. Open-architecture / sub-advisory wrappers score
      extra.
  - id: S5_trade_risk_oversight
    label: Trade surveillance & investment-risk oversight
    weight: 0.1
    guidance: Hands-on with best execution, PA dealing, investment guideline monitoring,
      conflicts. Tooling references (Bloomberg, Charles River, SimCorp, MCO, ACA)
      are positive.
  - id: S6_commercial_posture
    label: Commercial / front-office partnership
    weight: 0.1
    guidance: Evidence of enabling product launches, distribution growth, or new-client
      onboarding rather than blocking. Look for new-product committee, distribution
      support, or 1LOD rotations.
  - id: S7_buildout_resilience
    label: Post-acquisition / institutional build-out resilience
    weight: 0.08
    guidance: Has lived through M&A integration, licence variation, or a retail-to-institutional
      pivot and stayed. Penalise serial 18-month tenures during integration phases.
  - id: S8_credentials_network
    label: Credentials, regulator network & stability
    weight: 0.05
    guidance: ICA / IBF-STS / CAMS / law qualification; ex-MAS or known to MAS supervisors
      positively; tenure pattern shows 3+ year stints.
  shortlist_threshold: 35.0
spec:
  must_haves:
  - Based in Singapore (work authorization assumed; local MAS regime fluency non-negotiable)
  - "8-15 years compliance experience, with the bulk inside an MAS-licensed asset/fund\
    \ manager (CMS licensee \u2013 LFMC/RFMC) or a private bank/EAM serving Accredited\
    \ Investors"
  - Hands-on Accredited Investor (AI) onboarding & client classification under the
    SFA, including AML/CFT, KYC, source-of-wealth, and ongoing suitability
  - 'Direct line ownership of MAS regulatory interface: licence conditions, Form 1/Form
    22/Annex reporting, MAS Notices (SFA04-N12, FAA-N06, N14, N16), inspections and
    queries'
  - "Fund governance experience \u2013 working with fund boards, administrators, trustees,\
    \ custodians; reviewing offering docs, side letters, NAV/valuation oversight"
  - Trade surveillance & investment-risk oversight in a live portfolio environment
    (best execution, personal account dealing, conflicts, cross-trades)
  - "Comfortable as a sole/solo compliance function \u2013 has personally drafted\
    \ policies, run the compliance monitoring programme, and presented to a Board\
    \ / Audit & Risk Committee"
  - "Commercially-minded posture \u2013 evidence of partnering with front office on\
    \ product launches and distribution, not a pure gatekeeper"
  nice_to_haves:
  - Exposure to VCC (Variable Capital Company) structures and/or Cayman/Lux feeder
    wrappers distributed into Singapore AIs
  - Open-architecture / third-party fund distribution experience (platform, feeder,
    sub-advisory, or wrapper structures)
  - "Post-acquisition integration experience \u2013 building institutional frameworks\
    \ inside a firm transitioning from retail/IFA to institutional"
  - Familiarity with a global alternatives parent's group compliance reporting cadence
  - ICA / IBF-STS / CAMS / law degree; ex-MAS, ex-Big4 regulatory consulting, or ex-private
    bank Wealth Compliance background
  - "Has scaled headcount before (even if currently solo) \u2013 signals readiness\
    \ to build a team as AUM grows"
criteria_evidence:
- want: MAS regulatory fluency
  proxy: Tenure at an MAS-licensed CMS/LFMC/RFMC or local private bank, with title
    containing Compliance/MLRO and Singapore location across multiple roles
  signal: high
- want: AI (Accredited Investor) onboarding depth
  proxy: Compliance role at a Singapore EAM, private bank wealth desk, or boutique
    LFMC whose distribution is explicitly to AIs/HNW (not retail funds)
  signal: high
- want: Sole-compliance-officer scope readiness
  proxy: Current/prior employer headcount 15-120; candidate is the named Compliance
    Officer / Head of Compliance with no sub-team listed
  signal: high
- want: Fund governance
  proxy: Mentions of fund board reporting, offering memorandum, fund administrator/trustee
    oversight, NAV oversight, VCC, Cayman/Lux funds
  signal: medium
- want: Trade & investment risk oversight
  proxy: Skills/role text referencing trade surveillance, best execution, PA dealing,
    investment guideline monitoring, Bloomberg/Charles River/SimCorp
  signal: medium
- want: Commercial / front-office partnership
  proxy: Has sat on new-product committees, supported sales/distribution launches,
    or moved between 1LOD and 2LOD; language like 'business enablement', 'product
    approval', 'distribution support'
  signal: medium
- want: Open-architecture / wrapper familiarity
  proxy: Prior employer is a platform/feeder/multi-manager/EAM, or candidate references
    sub-advisory, white-label, or wrapper distribution
  signal: medium
- want: Post-acquisition build-out resilience
  proxy: Worked through an M&A integration, licence variation, or 'retail-to-institutional'
    pivot at a previous employer
  signal: medium
- want: "Wrong pool \u2013 retail/IFA-only"
  proxy: Entire career at MAS-licensed Financial Advisers (FAs) selling ILPs/unit
    trusts to retail; no AI/fund manager exposure
  signal: negative
- want: "Wrong pool \u2013 payments/crypto/brokerage"
  proxy: "Compliance career at payments institutions, crypto exchanges, retail brokerages,\
    \ or remittance \u2013 different MAS regime, no fund/AI muscle"
  signal: negative
- want: "Wrong pool \u2013 mega-bank 2LOD specialist"
  proxy: Career exclusively inside a tier-1 bank compliance silo (e.g. surveillance-only,
    or policy-only) with no end-to-end ownership
  signal: negative
market_map:
  pool_estimate: '~250-400 Singapore-based compliance professionals fit the core profile
    (MAS-licensed asset manager / EAM / private-bank wealth compliance, 8-15 yrs,
    sole-or-near-sole scope). Realistic prospect long-list: 120-180 after geography
    + seniority + firm-type filters.'
  target_companies:
    core:
    - "Singapore boutique LFMCs / RFMCs (SGD 200M\u20132B AUM) distributing to Accredited\
      \ Investors"
    - External Asset Managers (EAMs) / Multi-Family Offices licensed by MAS
    - Singapore-domiciled hedge funds & private credit managers serving AI/institutional
      clients
    - Boutique private-equity / alternatives managers with MAS CMS licence
    adjacent:
    - "Wealth/Private Banking compliance desks (UBS, Julius Baer, LGT, Pictet, BNP\
      \ WM, Lombard Odier) \u2013 AI-onboarding muscle, may lack fund-manager scope"
    - Mid-size global asset managers' Singapore compliance hubs (where the SG officer
      ran a near-solo remit)
    - Big4 / law-firm regulatory consultants with strong asset-management client roster
      (KPMG, PwC, EY, Deloitte FS Risk; A&G, Allen & Overy regulatory)
    - Fund administrators / trustees compliance leads (Apex, IQ-EQ, Trident, Vistra)
      with VCC exposure
    stretch:
    - Ex-MAS officers (Capital Markets / Investment Products / AML divisions) now
      2-5 years into industry
    - Hong Kong SFC Type 4/9 compliance officers willing/able to relocate and convert
      to MAS regime
    - Insurance-linked investment platform compliance officers with AI distribution
      exposure
    excluded:
    - Retail-only Financial Advisers / IFAs (MAS FA licence, ILP/unit-trust distribution
      to retail)
    - Payments Services Act licensees (payments, e-money, remittance)
    - Crypto/Digital Payment Token exchanges and DPT service providers
    - Retail brokerage / CFD / margin FX compliance
    - Corporate-services / company-secretarial compliance
    - Pure AML analysts with no investment-management context
off_limits:
- Current employees of the acquiring global alternatives parent (group conflict)
- "Compliance staff at firms the client distributes through or sub-advises (channel\
  \ conflict \u2013 to be confirmed with client)"
- Direct hires from named MAS supervisory team currently covering the licensee (cooling-off
  / perception risk)
negative_heuristics:
- id: N1
  label: "Mega-bank silo specialist \u2013 impressive bank, but only ran surveillance\
    \ OR only ran policy; never owned end-to-end and would drown as sole officer"
  enabled: true
- id: N2
  label: "Retail/IFA lifer \u2013 MAS FA licence world, ILP and unit-trust sales compliance\
    \ to retail; no AI/fund-manager muscle despite Singapore + 'Compliance' title"
  enabled: true
- id: N3
  label: "Payments/crypto compliance with strong MAS branding \u2013 fluent in PSA/DPT\
    \ regime but not SFA/CMS; wrong regulator chapter"
  enabled: true
- id: N4
  label: "Big4 regulatory consultant who never sat in 2LOD \u2013 advisory polish,\
    \ no live MAS inspection or Board-reporting scar tissue"
  enabled: true
- id: N5
  label: "Title-inflated 'Head of Compliance' at a 5-person shell \u2013 sole-by-default,\
    \ not sole-by-design; no real fund-governance or trade-oversight reps"
  enabled: true
- id: N6
  label: "Career gatekeeper with no commercial posture \u2013 will clash with the\
    \ growth-mode, front-office-partner brief"
  enabled: true
- id: N7
  label: "Recently-acquired-firm refugee \u2013 just lived through an integration\
    \ and is leaving precisely because they don't want to do it again"
  enabled: true
