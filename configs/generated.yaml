scoring:
  model: claude-sonnet-4-6
  gates:
  - id: G1_location_sg
    description: Currently based in Singapore.
    hard: true
  - id: G2_am_compliance_experience
    description: Has held an in-house compliance role at a buy-side asset manager
      / fund manager (not solely bank, Big-4 advisory, regulator, or retail IFA).
    hard: true
  - id: G3_experience_band
    description: 8-15 years total compliance experience (allow 7 floor / 17 ceiling
      for exceptional fit).
    hard: true
  sub_scores:
  - id: S1_independent_am_scope
    label: Sole/near-sole compliance ownership at an independent SG AM
    weight: 0.22
    guidance: 'Top marks: only compliance officer (or 1-of-2) at an SG MAS CMS AM
      with 15-150 staff. Penalise large-team compliance analysts at global AMs and
      ''Head of Compliance APAC'' at bulge brackets.'
  - id: S2_ai_onboarding_under_own_license
    label: Direct AI onboarding under own CMS license
    weight: 0.2
    guidance: "Evidence of running AI eligibility, opt-in, declarations, and onboarding\
      \ flows at a licensee \u2014 not as a distributor of someone else's product.\
      \ Retail/IFA-only onboarding scores low."
  - id: S3_mas_cms_fluency
    label: MAS CMS regime + SFA fluency
    weight: 0.13
    guidance: Profile evidence (skills, courses, conference talks, regulator-facing
      reps) of CMS licensing conditions, AI/Retail distinction, FAA touchpoints. Penalise
      career bankers with generic 'MAS compliance' tagline.
  - id: S4_open_architecture_third_party
    label: Open-architecture / third-party PC-PE-HF wrapper exposure
    weight: 0.12
    guidance: Worked at a multi-manager / wrapper platform or AM distributing external
      GP funds to AIs. Fund selection DD compliance reps are a strong tell.
  - id: S5_vcc_and_fund_governance
    label: VCC and fund governance reps
    weight: 0.08
    guidance: Concrete VCC umbrella/sub-fund or SG-domiciled fund governance work.
      Reward sub-fund board reporting reps.
  - id: S6_commercial_orientation
    label: Commercial / front-office partnership posture
    weight: 0.1
    guidance: "Language and trajectory suggest enabler not blocker \u2014 moved from\
      \ big-bank to boutique AM, sat with investment team, supported product launches.\
      \ Penalise pure surveillance/monitoring career arcs."
  - id: S7_transformation_buildout
    label: Build / transformation track record
    weight: 0.08
    guidance: "Evidence of building a compliance framework from low base, navigating\
      \ M&A integration, or scaling a CMS license \u2014 not steady-state BAU at a\
      \ mature institution."
  - id: S8_sg_stability_and_seniority_fit
    label: SG career continuity and 8-15y seniority sweet spot
    weight: 0.07
    guidance: 5+ years continuous SG tenure; experience band lands cleanly in 8-15y;
      avoid both too-junior (<8y) and over-senior (>17y, will be expensive/over-titled
      for sole-officer seat).
  shortlist_threshold: 35.0
spec:
  must_haves:
  - Singapore-based with right to work; stable SG career footprint
  - 8-15 years compliance experience, of which a clear majority in-house at a buy-side
    asset/fund manager
  - Hands-on ownership of MAS CMS-licensed entity obligations (licensing conditions,
    returns, breach reporting, Form 1/22A/23A familiarity)
  - Direct experience onboarding Accredited Investor clients under the firm's own
    license (not retail/IFA distribution)
  - "Comfort as sole or near-sole compliance owner (no team beneath) \u2014 has operated\
    \ at <150-person AM"
  - Board / senior-management reporting reps
  - "Commercial posture \u2014 track record partnering with portfolio managers and\
    \ distribution, not gatekeeper-only"
  nice_to_haves:
  - Open-architecture / third-party fund distribution experience (PC, PE, HF wrappers)
  - VCC structuring and sub-fund governance experience
  - Experience through an M&A / parent-integration transition
  - Familiarity with global alternatives GP operating standards (post-acquisition
    fit)
  - Trade surveillance and risk oversight exposure beyond pure regulatory compliance
  - Prior build-out of a compliance framework from a low base (transformation, not
    BAU)
  - MAS Representative Notification / CACS certifications
criteria_evidence:
- want: Sole/near-sole compliance ownership at an independent SG AM
  proxy: Current/prior title is Head of Compliance / Compliance Officer / CCO at an
    SG-licensed AM with <100 employees and no visible compliance team beneath them
    on LinkedIn
  signal: high
- want: Direct AI onboarding under own CMS license
  proxy: Tenure at an MAS CMS-licensed AM serving Accredited Investors (not retail/IFA-distributed
    funds); profile mentions AI onboarding, KYC for AIs, or private fund distribution
  signal: high
- want: MAS CMS license fluency and AI/Retail distinction
  proxy: Profile/skills mention CMS license, MAS SFA, FAA, Notice SFA 04-N02, AI onboarding,
    Section 4A SFA
  signal: high
- want: Open-architecture / third-party fund distribution exposure
  proxy: Experience at multi-manager/feeder/wrapper platforms, fund-of-funds, or AM
    with distribution of GP funds (private credit / PE / hedge)
  signal: medium
- want: VCC structure familiarity
  proxy: Mentions VCC, Variable Capital Company, sub-fund governance, or worked at
    an AM that launched VCCs post-2020
  signal: medium
- want: Commercial orientation / front-office partnership
  proxy: Profile language emphasises 'business enablement', 'partnering with investment
    team', growth-stage AM tenure, or move from large-bank compliance into boutique
    AM
  signal: medium
- want: Transformation / build-out capability
  proxy: Joined an AM at sub-30 headcount and stayed through scale-up; led framework/policy
    build, not BAU monitoring at a large institution
  signal: medium
- want: Singapore-based and stable
  proxy: Current location Singapore for 5+ years; PR/citizen signals (career continuity
    in SG); not a recent expat parachute
  signal: high
- want: NOT pure retail/IFA heritage
  proxy: Compliance career at IFA platforms, insurance-linked product distributors,
    or retail wealth managers with no AI fund work
  signal: negative
- want: NOT pure banking capital-markets compliance
  proxy: Career entirely at GS/JPM/UBS/DBS/StanChart capital-markets or wholesale-banking
    compliance with no AM seat
  signal: negative
- want: NOT Big-4 advisory only
  proxy: Career path Deloitte/EY/KPMG/PwC regulatory advisory with no in-house AM
    tenure
  signal: negative
- want: NOT ex-MAS only
  proxy: Entire career at MAS or other regulators with no buy-side industry seat
  signal: negative
market_map:
  pool_estimate: ~120-200 plausible in-house AM compliance professionals in Singapore;
    realistic target shortlist universe ~40-70 after AI-onboarding and scale filters;
    ~15-25 truly on-point.
  target_companies:
    core:
    - Independent SG-headquartered MAS CMS-licensed asset managers, ~15-150 staff,
      serving Accredited Investors (e.g. Gordian Capital, Lumen Capital, Avanda, Quantedge,
      Asia Genesis, Dymon Asia, Tsao Family Office AM arms, ADM Capital SG, Silverdale,
      New Silk Road, APS Asset Management)
    - SG arms of mid-size global alternatives / private-markets managers with a CMS
      license and lean compliance (e.g. Tikehau SG, Muzinich SG, Pierfront, Pinpoint,
      Triata)
    - Open-architecture / multi-manager platforms distributing third-party private
      funds to AIs (e.g. iFAST CMS arm, Endowus, Stashaway-AI line, ICHAM, Lumen)
    adjacent:
    - Single/multi family offices in SG with CMS or RFMC license running external
      manager allocations
    - Private banking AI-segment compliance officers with explicit fund-distribution
      remit (boutique PB only)
    - Fund administrators / VCC service providers with strong AM-side regulatory advisory
      (only if they've since moved in-house)
    - Hedge fund / PE GPs with SG CMS sub-scale operations needing a sole compliance
      person
    stretch:
    - Wealth managers transitioning from retail to AI segment with demonstrated AI
      onboarding build
    - Compliance leads at SG fintech AMs (robo-advisor CMS holders) who built AI flows
    - Recent ex-MAS officers (CIS/IID division) who then did 3+ years in an AM seat
    excluded:
    - Pure retail IFA / insurance FA compliance
    - Bulge-bracket bank wholesale/markets compliance with no AM seat
    - Big-4 regulatory advisory with no in-house AM tenure
    - Career regulators with no industry seat
    - Insurance / reinsurance compliance
    - Payments / crypto exchange compliance (unless they did AM compliance later)
off_limits:
- Current employees of the acquiring top-tier global alternatives parent (conflict)
- 'Named study-only firms: Gordian Capital, Endowus, iFAST CMS arm, Tikehau Singapore
  (study the shape, do not source from)'
- Direct competitors under any existing no-poach if disclosed by client (flag for
  confirmation)
negative_heuristics:
- id: N1_ifa_retail_heritage
  label: Long IFA / retail wealth compliance career with 'asset management' in title
    but no AI/CMS fund work
  enabled: true
- id: N2_bank_compliance_cosplay
  label: Bulge-bracket bank compliance officer with 'covered asset management desk'
    but never sat inside an AM
  enabled: true
- id: N3_big4_advisory
  label: "Big-4 regulatory/FS advisory manager-director with no in-house seat \u2014\
    \ knows the rules, never owned them"
  enabled: true
- id: N4_ex_mas_only
  label: "Career MAS officer with no buy-side seat \u2014 policy fluency, no operating\
    \ reps"
  enabled: true
- id: N5_large_am_specialist
  label: "Compliance analyst/manager at BlackRock/Fidelity/Schroders SG \u2014 one\
    \ of 10+ in compliance team, never sole owner"
  enabled: true
- id: N6_fund_admin_lifer
  label: "Career fund administrator (Apex, Citco, IQ-EQ) compliance \u2014 service-provider\
    \ lens, not licensee accountability"
  enabled: true
- id: N7_title_inflation_boutique
  label: "'Head of Compliance' at a 3-person family office shell \u2014 title matches\
    \ but scope/transferability is thin"
  enabled: true
- id: N8_crypto_only
  label: "DPT/crypto compliance under PSA only \u2014 wrong regulatory regime for\
    \ CMS AI fund distribution"
  enabled: true
