scoring:
  model: claude-sonnet-4-6
  gates:
  - id: G1_singapore_based
    description: Candidate currently based in Singapore (work-rights assumed or PR/citizen).
      Remote/relocators not in scope.
    hard: true
  - id: G2_buyside_AM_experience
    description: At least one substantive tenure (24+ months) in a compliance seat
      at a buy-side asset manager / fund manager (not bank, not brokerage, not insurer,
      not consulting, not regulator).
    hard: true
  - id: G3_experience_band
    description: Total compliance experience between 8 and 17 years inclusive. Below
      = too junior for sole-CO Board-facing seat; above = overqualified / cost-misaligned
      for sole-contributor scope.
    hard: true
  sub_scores:
  - id: S1_sole_co_scope
    label: Sole/near-sole compliance ownership at a SG-licensed AM
    weight: 0.25
    guidance: 'Top marks: named CO/Head of Compliance at a CMS-licensed AM with <80
      staff, 2+ yrs, evidence of Board reporting. Mid: deputy/No.2 in a small team
      (2-3). Low: specialist role inside a large team.'
  - id: S2_AI_onboarding_under_own_licence
    label: Accredited Investor onboarding under firm's own CMS licence
    weight: 0.18
    guidance: 'Top: explicit AI onboarding framework ownership, AI re-opt-in process,
      suitability for AI distribution. Mid: AI exposure but co-owned with sales/ops.
      Low: only retail or IFA-channel onboarding.'
  - id: S3_open_architecture_alts
    label: Open-architecture / third-party alts distribution exposure
    weight: 0.15
    guidance: 'Top: ran compliance over feeders/wrappers of external PC/PE/HF GPs,
      including GP DD and offering-doc review. Mid: in-house funds plus some third-party.
      Low: single-strategy in-house only.'
  - id: S4_MAS_fluency_licensee_side
    label: MAS regulatory management from the licensee side
    weight: 0.12
    guidance: 'Top: authored MAS notifications, Form 1 returns, thematic-inspection
      responses, licence variations. Mid: contributed. Low: knowledge only.'
  - id: S5_vcc_and_fund_governance
    label: VCC familiarity & fund governance
    weight: 0.1
    guidance: 'Top: VCC setup or sub-fund oversight + sat on or serviced a Fund Board.
      Mid: VCC awareness via service providers. Low: no fund-structure exposure.'
  - id: S6_commercial_partnership
    label: Commercial posture / front-office partnership in growth mode
    weight: 0.1
    guidance: 'Top: profile language shows enablement of new products/launches in
      a build-out phase. Mid: balanced. Low: pure monitoring/gatekeeping vocabulary.'
  - id: S7_transformation_signal
    label: Track record through transition / integration / build-out
    weight: 0.06
    guidance: 'Top: lived through an acquisition, licence upgrade, or rebuild of compliance
      infra. Mid: joined post-transition. Low: only steady-state BAU houses.'
  - id: S8_trade_risk_oversight
    label: Trade surveillance & investment risk oversight breadth
    weight: 0.04
    guidance: 'Top: owned trade surveillance + investment-guideline monitoring across
      multi-asset. Mid: partial. Low: none.'
  shortlist_threshold: 35.0
spec:
  must_haves:
  - Singapore-based; able to act as named/responsible compliance officer for an MAS
    CMS licensee
  - 8-15 years compliance experience, weighted toward buy-side asset management
  - Sole or near-sole compliance ownership at a Singapore-licensed asset manager (not
    part of a large team where scope was siloed)
  - "Direct experience onboarding Accredited Investor (AI) clients under the firm's\
    \ own CMS license \u2014 not purely retail/IFA-channel onboarding"
  - Working fluency with MAS CMS licensing regime, SFA/FAA, and the AI vs Retail distinction
    (including AI re-opt-in)
  - "Demonstrated commercial posture \u2014 partnering with front office in a growth/build-out\
    \ environment, not pure gatekeeping"
  nice_to_haves:
  - Experience with open-architecture / third-party fund distribution (private credit,
    PE, hedge fund feeders or wrappers from global GPs)
  - "VCC (Variable Capital Company) structure familiarity \u2014 set-up, sub-fund\
    \ governance, or service-provider oversight"
  - Fund governance / Board reporting experience as primary author, not contributor
  - Trade surveillance and investment risk oversight in a multi-asset / alts context
  - Prior experience through an ownership transition, parent-integration, or licence
    upgrade
  - Relationships with MAS supervisors at the asset-management desk
criteria_evidence:
- want: Sole-compliance scope (true end-to-end ownership, not a specialist slice)
  proxy: Current/prior employer headcount under ~80; title is Head of Compliance /
    Compliance Officer / CCO at that entity; tenure 2+ years in that seat
  signal: high
- want: Buy-side asset-management compliance (not banking / brokerage / payments)
  proxy: Employer industry = Investment Management / Venture Capital & Private Equity
    / Capital Markets (asset-manager subtype); fund names or AUM references in profile
    text
  signal: high
- want: AI client onboarding under own CMS licence
  proxy: Mentions of 'Accredited Investor', 'AI onboarding', 'CMS licence', 'SFA',
    client-suitability framework for AI; absence of 'IFA channel' / 'retail distribution'
    framing
  signal: medium
- want: Open-architecture / third-party fund distribution exposure
  proxy: References to feeder funds, master-feeder, private credit/PE/HF wrappers,
    sub-advisory, platform distribution, GP due diligence
  signal: medium
- want: VCC familiarity
  proxy: Mentions of VCC, sub-fund, umbrella fund, or Singapore fund structuring post-2020
  signal: medium
- want: Commercial / front-office partnership mindset
  proxy: Verbs like 'enabled', 'partnered with investment team', 'supported launch
    of', 'built framework for new product'; growth-stage employer; not exclusively
    'monitored/audited/reviewed'
  signal: medium
- want: MAS fluency from the regulated-entity side
  proxy: Author of MAS submissions/notifications, periodic returns (Form 1), thematic
    inspection responses; NOT 'MAS' as employer
  signal: high
- want: Stable, credible seniority band (8-15 yrs)
  proxy: Graduation ~2009-2017; current title Manager/Senior Manager/Head/Director;
    no jumps every 12 months
  signal: medium
- want: Not a retail/IFA-only compliance background
  proxy: 'Negative: career anchored at AIA/Prudential/Manulife agency compliance,
    IFA platforms (iFAST retail side), or bancassurance'
  signal: negative
market_map:
  pool_estimate: ~120-180 truly relevant Singapore-based individuals across core+adjacent;
    realistic shortlist universe 35-60; high-conviction 8-15.
  target_companies:
    core:
    - Singapore independent / boutique asset managers with CMS licence and AI client
      base (e.g. Lumen Capital Investors, Tsao Family Office-affiliated managers,
      Avanda Investment Management, Fullerton-adjacent boutiques, JL Family Office's
      regulated arm, Maitri Asset Management, Lighthouse Canton's asset-management
      entity, Envysion Wealth, Crossinvest, Stamford Management, Finexis AM, ICH Capital,
      Q Investment Partners)
    - Singapore-based multi-family-office regulated entities running AI distribution
      and open-architecture feeders (Golden Equator, Raffles Family Office regulated
      entity, Taurus Wealth's CMS arm)
    - Singapore VCC-using boutique alts managers distributing private credit / PE
      / HF feeders to AI clients
    adjacent:
    - Asia regional offices of mid-size global asset managers where the SG compliance
      officer is the sole/lead local CO (e.g. Schroders SG compliance lead's deputies,
      Eastspring product compliance, Nikko AM SG, Manulife IM, Pictet AM SG, Lombard
      Odier IM SG, Edmond de Rothschild AM)
    - "External Asset Managers (EAMs) with CMS licence covering AI clients \u2014\
      \ provided the candidate owned licence-level compliance, not just RM-suitability"
    - Singapore hedge fund managers / single-strategy alts managers with CMS licence
      (Asia Genesis, Dymon Asia compliance, Asia Frontier, FengHe, Tybourne SG)
    - "Fund administrators / trustees whose compliance leads have crossed into asset-manager\
      \ seats (Apex, IQ-EQ, Vistra SG) \u2014 only if buy-side stint exists"
    stretch:
    - Private bank / EAM-coverage compliance officers with documented AI-onboarding
      ownership and a stated desire to move buy-side
    - Fund-structuring lawyers (in-house at SG AMs) who pivoted into a compliance/legal
      hybrid head-of-compliance role
    - PE/VC GP compliance leads in Singapore where AI distribution to LPs is analogous
    excluded:
    - MAS career regulators with no industry-side stint
    - Big 4 / consulting regulatory advisory only (no in-house licensee seat)
    - Retail bank / bancassurance / IFA-channel compliance
    - Payments, crypto exchange, brokerage, and corporate-services compliance
    - Insurance and bancassurance compliance
    - Junior compliance analysts <8 yrs and group-CCOs >18 yrs who won't sit sole-CO
off_limits:
- The acquiring top-tier global alternatives parent and its Singapore affiliates
- "Confirmed direct competitors the client will name at kickoff (placeholder \u2014\
  \ confirm with client)"
- Candidates the client or parent has interviewed in the last 12 months
- Current MAS supervisory staff covering the client (conflict / cooling-off)
negative_heuristics:
- id: N1_bank_compliance_cosplay
  label: "Private-bank or retail-bank compliance officer who lists 'asset management'\
    \ because the bank had an AM arm \u2014 never sat inside the licensed AM entity."
  enabled: true
- id: N2_big4_advisory
  label: "Big 4 / consulting regulatory-advisory career with no in-house licensee\
    \ tenure \u2014 knows the rules academically, has never owned a CMS licence."
  enabled: true
- id: N3_mas_alum_pure
  label: "Ex-MAS officer with no industry-side operating experience \u2014 policy\
    \ fluency but no licensee accountability or commercial posture."
  enabled: true
- id: N4_ifa_retail_only
  label: "Compliance lead at an IFA / retail distribution platform \u2014 owned suitability\
    \ for retail clients, never AI onboarding under own licence."
  enabled: true
- id: N5_big_house_specialist
  label: Senior compliance specialist at a global house (e.g. BlackRock / Fidelity
    SG) who only owned a sliver (e.g. marketing review, code of ethics) and has never
    been sole CO.
  enabled: true
- id: N6_fundadmin_only
  label: "Fund admin / trustee / corporate-services compliance only \u2014 service-provider\
    \ lens, not licensee lens."
  enabled: true
- id: N7_crypto_payments_drift
  label: "PSA-licensee / crypto / payments compliance \u2014 wrong regime, wrong client\
    \ model."
  enabled: true
- id: N8_title_inflation_solo
  label: '''Head of Compliance'' at a 3-person entity that is a corporate-services
    shell or family-office admin vehicle, not a real CMS-licensed asset manager.'
  enabled: true
