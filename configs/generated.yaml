mandate:
  id: generated
  name: "Sole Compliance Officer \u2014 Singapore MAS-Licensed Asset Manager (CMS,\
    \ AI Distribution, VCC)"
  description: 'Client: Singapore-headquartered, MAS-licensed asset manager. Approximately
    SGD 400-700M proprietary AUM, with materially larger third-party AUM distributed
    to Accredited Investor clients via open-architecture wrappers (private credit,
    private equity, hedge funds from global GPs). Recently acquired by a top-tier
    global alternatives manager and currently rebuilding institutional infrastructure
    following a transition from retail/IFA-linked heritage. Holds a Capital Markets
    Services (CMS) license under MAS.


    The role: Sole compliance officer for the entity. Full ownership: Accredited Investor
    client onboarding compliance, MAS regulatory management, fund governance, trade
    and risk oversight, Board reporting. No team beneath the hire. Reports to senior
    management and Board. A transformational seat, not steady-state BAU.


    Profile orientation: Singapore-based candidates only. 8-15 years compliance experience.
    Commercially oriented; the firm is in growth mode and the role requires partnership
    with the front office.


    What good looks like: Sole or near-sole compliance experience at an independent
    Singapore asset manager; direct Accredited Investor onboarding under the firm''s
    own license (not retail/IFA only); fluency with MAS CMS licensing categories and
    the Accredited Investor vs Retail distinction; exposure to open-architecture /
    third-party fund distribution; VCC structure familiarity.


    What weak looks like: Pure banking or capital markets compliance with no asset-management
    exposure; Big 4 advisory compliance only; MAS regulators with no industry side;
    retail-only IFA compliance with no Accredited Investor onboarding.'
